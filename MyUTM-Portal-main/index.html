<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<title>Sign In - UTM Portal</title> 
<link rel="icon" href="assets/home/myutm_200.png" type="image/png">         
<style> 
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: url('assets/signin/background8.jpg') center/cover no-repeat; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0;
} 

.login-card { 
    background: #fff; 
    padding: 40px; 
    border-radius: 12px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
    width: 350px; 
    text-align: center;
} 

.login-card img {
    width: 140px;
    margin-bottom: 10px;
}

h3 {
    margin-top: 0;
    margin-bottom: 20px;
    color: #444;
    font-weight: 500;
    font-size: 22px;
}

input { 
    width: 100%; 
    padding: 12px 15px; 
    margin-bottom: 15px; 
    border-radius: 8px; 
    border: 1px solid #ddd; 
    box-sizing: border-box;
    font-size: 14px;
} 

input:focus {
    outline: none;
    border-color: #8b0000;
}

button { 
    width: 100%; 
    padding: 12px; 
    border: none; 
    border-radius: 25px; 
    background: #fff; 
    color: #444; 
    font-weight: 600; 
    cursor: pointer; 
    transition: all 0.3s;
    border: 1px solid #ddd;
} 

button:hover {
    background: #f5f5f5;
}

.forgot-link {
    display: block;
    margin-top: 15px;
    color: #3498db;
    text-decoration: none;
    font-size: 13px;
}
</style> 
</head> 

<body> 

<div class="login-card"> 
    <h3>Sign In</h3>
    <img src="assets/home/myutm_200.png" alt="UTM Logo"> 
    
    <form id="loginForm">
        <input type="text" id="utmid" placeholder="Username" required> 
        <input type="password" id="password" placeholder="Password" required> 

        <button type="submit">Login</button> 
    </form> 
    <a href="#" class="forgot-link">Forgot your password?</a>
</div> 

<script src="js/main.js"></script>
<script> 
if (sessionStorage.getItem("isLoggedIn") === "true") { 
  window.location.href = "home.html"; 
} 
</script> 
</body> 
</html>
